<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  :root{
    --ink:#262626; --paper:#fffff0; --raised:#ffffff;
    --line:#e0ddc8; --muted:#8a8270;

    --work:#46b1e1; --work-soft:#dff1fb; --work-text:#1a6a92;
    --home:#c04f15; --home-soft:#fae5d8; --home-text:#7a2e08;
    --mint:#b4e5a2; --mint-soft:#d8f5cc; --mint-text:#2d6b1f;
    --done-bg:#f0fcea;

    --danger:#c0392b;
    --shadow:0 1px 2px rgba(38,38,38,.05), 0 4px 14px rgba(38,38,38,.07);
    --radius:12px;
    --radius-btn:9px;
    --font-body:-apple-system,"SF Pro Text","Segoe UI",sans-serif;
    --font-serif:Georgia,"Iowan Old Style",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:var(--font-body);
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    padding:28px 24px 70px;
  }
  .wrap{max-width:1320px;margin:0 auto;}

  .app-header{ display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between; gap:16px;margin-bottom:20px; }
  .logo-row{ display:flex; align-items:center; gap:12px; }
  .app-logo{ width:44px; height:44px; object-fit:contain; border-radius:10px; flex-shrink:0; }
  .app-header h1{ font-family:var(--font-serif);font-size:clamp(22px,3vw,30px);font-weight:600;margin:0;color:var(--ink); }
  .app-header .sub{color:var(--muted);font-size:13px;margin-top:6px;max-width:480px;}

  /* board tabs: segmented control, same pattern as .tabs in reference */
  .board-tabs-outer{ display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .board-tabs{ display:flex; gap:4px; background:var(--line); padding:4px; border-radius:var(--radius); flex-wrap:wrap; }
  .board-tab{
    padding:9px 16px; font-size:13px; font-weight:600; border-radius:9px; cursor:pointer; user-select:none;
    color:#5c5848; border:none; background:none; display:inline-flex; align-items:center; gap:6px;
    transition:background .15s, color .15s;
  }
  .board-tab.active{ background:var(--ink); color:#fff; }
  .board-tab .settings-icon{font-size:11px;opacity:.75;}
  .board-tab-add{
    width:34px;height:34px;border-radius:50%;border:1px dashed var(--line);background:none;
    color:var(--muted);font-size:16px;cursor:pointer;
  }
  .board-tab-add:hover{ color:var(--work-text); border-color:var(--work); }

  .add-bar{ display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:6px; }
  .add-bar input[type=text]{
    flex:1;min-width:220px;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-btn);
    padding:11px 13px;font-family:var(--font-body);font-size:14px;color:var(--ink);
  }
  .add-bar input[type=text]:focus{ outline:none; border-color:#a39d8c; }
  .add-bar select{
    background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-btn);padding:11px 10px;
    font-family:var(--font-body);font-size:13px;color:var(--ink);
  }
  .btn{
    font-family:var(--font-body);font-weight:600;font-size:13.5px;border:none;border-radius:var(--radius-btn);
    padding:11px 20px;cursor:pointer;color:#fff;
  }
  .btn:active{ transform:scale(.98); }
  .btn-primary{ background:var(--work); }
  .btn-secondary{ background:none; color:var(--muted); border:1px solid var(--line); }
  .btn-danger{ background:var(--danger); }

  .board{ display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:24px;margin-top:22px;align-items:start; }
  @media (max-width:900px){ .board{grid-template-columns:1fr;} }

  .col{ padding:0; }
  .col-header-row{ display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px; }
  .col-header{
    display:inline-flex;align-items:center;gap:7px;
    font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
    padding:5px 12px;border-radius:6px;
  }
  .col-backlog .col-header{ background:var(--work-soft); color:var(--work-text); }
  .col-arbeit .col-header{ background:var(--home-soft); color:var(--home-text); }
  .col-done .col-header{ background:var(--mint-soft); color:var(--mint-text); }

  .wip-tag{ font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--home-soft);color:var(--home-text); }
  .wip-tag.over{ background:var(--danger); color:#fff; }

  .subcol{margin-top:18px;}
  .subcol:first-of-type{margin-top:0;}
  .subcol h3{ font-size:11px;font-weight:700;color:#8c8674; text-transform:uppercase;letter-spacing:.06em;margin:0 0 9px 2px; }

  .dropzone{ min-height:50px; max-height:60vh; overflow-y:auto; border-radius:var(--radius); transition:background .15s ease; display:flex;flex-direction:column;gap:9px; padding:2px; }
  .dropzone.drag-over{ background:var(--work-soft); outline:2px dashed var(--work); }
  .dropzone.empty::after{ content:"– leer –";color:#c2bca8;font-size:12px;text-align:center;padding:10px 0;display:block; }
  .col-arbeit .dropzone{min-height:100px;}
  .col-done .dropzone{min-height:80px;}

  /* task cards: mirrors li.check-item exactly */
  .card{
    position:relative;
    background:var(--raised); border:1px solid var(--line); border-radius:var(--radius);
    padding:13px 13px 34px; box-shadow:var(--shadow);
    font-size:14.5px; line-height:1.35; cursor:grab; touch-action:none; user-select:none;
    transition:transform .1s ease, box-shadow .15s ease;
  }
  .card:active{ transform:scale(.99); }
  .card.col-done{ background:var(--done-bg); border-color:var(--mint); }
  .card.dragging{
    position:fixed; z-index:999; cursor:grabbing;
    box-shadow:0 10px 26px rgba(38,38,38,.22);
    transform:scale(1.03) !important; pointer-events:none;
  }

  .card-title{ font-weight:500; word-break:break-word; color:var(--ink); }
  .card.col-done .card-title{ text-decoration:line-through; color:#6b8c5e; text-decoration-color:var(--mint); }

  .card-chip{
    display:inline-block; margin-top:7px; padding:2px 7px; border-radius:4px;
    font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.03em;
  }
  .col-w4 .card-chip, .col-m3 .card-chip, .col-m3p .card-chip{ background:var(--work-soft); color:var(--work-text); }
  .col-arbeit .card-chip{ background:var(--home-soft); color:var(--home-text); }
  .col-done .card-chip{ background:var(--mint-soft); color:var(--mint-text); }

  .card-meta{ margin-top:6px; font-size:11px; color:var(--muted); }

  .card-footer{ position:absolute;left:13px;right:13px;bottom:10px; display:flex;align-items:center;justify-content:space-between;gap:6px; }
  .avatar-stack{display:flex;align-items:center;}
  .avatar-stack .av{
    width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:8px;font-weight:700;color:#fff; margin-left:-6px; border:2px solid var(--raised);
  }
  .card.col-done .avatar-stack .av{ border-color:var(--done-bg); }
  .avatar-stack .av:first-child{margin-left:0;}
  .avatar-stack .av.more{background:var(--line);color:var(--muted);font-size:8px;}

  .card-del{
    width:22px;height:22px;border-radius:50%;border:none;background:none;
    color:#c2bca8;font-size:14px;line-height:1;cursor:pointer;flex-shrink:0;
  }
  .card-del:hover{ color:var(--danger); }

  .team-strip{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
  .team-avatar{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:var(--muted);}
  .team-avatar .circle{
    width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:12px;color:#fff; box-shadow:var(--shadow);
  }

  /* overlay + modal: centered adaptation of the reference's bottom sheet */
  .overlay{
    position:fixed;inset:0;background:rgba(28,27,25,.45);
    -webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);
    display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;overflow-y:auto;
  }
  .modal{ background:var(--raised); color:var(--ink); border-radius:20px; padding:22px; width:100%; max-width:340px; box-shadow:0 20px 50px rgba(28,27,25,.25); }
  .modal.modal-wide{max-width:420px;}
  .modal h3{ font-family:var(--font-serif); font-size:18px; font-weight:600; margin-bottom:4px; }
  .modal p.hint{ margin:0 0 14px; font-size:12px; color:var(--muted); }
  .modal label{ display:block; font-size:11px; font-weight:700; color:#8c8674; text-transform:uppercase; letter-spacing:.06em; margin:14px 0 6px; }
  .modal label:first-of-type{margin-top:4px;}
  .modal input[type=text], .modal input[type=date], .modal textarea{
    width:100%;border:1px solid var(--line);background:var(--paper);border-radius:var(--radius-btn);
    padding:11px 12px;font-size:14.5px;font-family:var(--font-body);color:var(--ink);
  }
  .modal input:focus, .modal textarea:focus{ outline:none;border-color:#a39d8c; }
  .modal textarea{resize:vertical;min-height:64px;}
  .date-row{display:flex;gap:10px;}
  .date-row > div{flex:1;}
  .date-row label{margin-top:0;}
  .checkbox-row{display:flex;align-items:center;gap:10px;margin-top:16px;}
  .checkbox-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--work);}
  .checkbox-row label{margin:0;text-transform:none;font-size:13px;color:var(--ink);letter-spacing:0;font-weight:500;}
  .quick-names{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;}
  .quick-chip{ border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:12px;cursor:pointer;background:var(--paper);color:var(--ink); }
  .quick-chip:hover{ border-color:var(--work); }
  .assignee-editor-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
  .assignee-editor-chip{
    display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 6px 5px 12px;font-size:12px;
    background:var(--work-soft);color:var(--work-text);font-weight:600;
  }
  .assignee-editor-chip button{ width:16px;height:16px;border-radius:50%;border:none;background:rgba(26,106,146,.15);color:var(--work-text);font-size:10px;cursor:pointer; }
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;flex-wrap:wrap;}
  .modal-actions-split{display:flex;justify-content:space-between;gap:10px;margin-top:18px;flex-wrap:wrap;}

  .toast{
    position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);font-size:13px;font-weight:600;
    padding:11px 20px;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.25);
    opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;z-index:1100;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  footer.credit{text-align:center;color:#c2bca8;font-size:11px;margin-top:36px;}
</style>

<script>
(function(){
  "use strict";

  function cid(){ return "id" + Math.random().toString(36).slice(2,10); }

  function showToast(msg){
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._timer);
    t._timer = setTimeout(function(){ t.classList.remove("show"); }, 1800);
  }

  function demoTasks(){
    return [];
  }

  function makeBoard(name, tasks, multiPerson){
    return {id:cid(), name:name, tasks:tasks || [], multiPerson: !!multiPerson};
  }

  var STORAGE_KEY = "kanban_boards_v1";
  var DATA_URL = "./__kanban_data__";

  function saveState(){
    var payload = JSON.stringify({ boards: boards, currentBoardId: currentBoardId });
    // primary: cache-storage via service worker (survives the Safari <-> standalone-app split on iOS)
    fetch(DATA_URL, { method: "POST", body: payload }).catch(function(err){
      console.warn("Speichern über Cache-Storage fehlgeschlagen:", err);
    });
    // secondary: localStorage (fine for normal desktop/Android browser tab use)
    try{ localStorage.setItem(STORAGE_KEY, payload); }
    catch(err){ console.warn("Speichern über localStorage fehlgeschlagen:", err); }
  }

  function parseSaved(raw){
    try{
      var parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.boards) && parsed.boards.length) return parsed;
    }catch(err){}
    return null;
  }

  function loadState(){
    return fetch(DATA_URL, { cache: "no-store" })
      .then(function(res){ return res.text(); })
      .then(function(text){
        var fromCache = parseSaved(text);
        if (fromCache) return fromCache;
        try{ return parseSaved(localStorage.getItem(STORAGE_KEY)); }
        catch(err){ return null; }
      })
      .catch(function(){
        try{ return parseSaved(localStorage.getItem(STORAGE_KEY)); }
        catch(err){ return null; }
      });
  }

  var boards, currentBoardId;

  function boot(saved){
    if (saved){
      boards = saved.boards;
      currentBoardId = boards.some(function(b){ return b.id === saved.currentBoardId; }) ? saved.currentBoardId : boards[0].id;
    } else {
      boards = [ makeBoard("Board 1", demoTasks(), false) ];
      currentBoardId = boards[0].id;
    }
    render();
  }

  function getCurrentBoard(){ return boards.find(function(b){ return b.id === currentBoardId; }); }

  var AVATAR_COLORS = ["#46b1e1","#c04f15","#8a7fd1","#d6a02c","#2d9c8a","#d9695b"];

  function colorFor(name){
    var sum = 0;
    for (var i=0;i<name.length;i++) sum += name.charCodeAt(i);
    return AVATAR_COLORS[sum % AVATAR_COLORS.length];
  }
  function initials(name){
    var parts = name.trim().split(/\s+/);
    if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
    return (parts[0][0] + parts[1][0]).toUpperCase();
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }
  function fmtDate(d){
    if (!d) return "";
    var p = d.split("-");
    if (p.length !== 3) return d;
    return p[2] + "." + p[1] + ".";
  }

  var COLS = ["w4","m3","m3p","arbeit","done"];
  var COL_LABEL = {w4:"4 Wochen", m3:"3 Monate", m3p:"> 3 Monate", arbeit:"in Arbeit", done:"Erledigt"};

  function render(){
    saveState();
    renderTabs();
    var board = getCurrentBoard();
    var tasks = board.tasks;

    COLS.forEach(function(colId){
      var dz = document.querySelector('.dropzone[data-col="'+colId+'"]');
      dz.innerHTML = "";
      var colTasks = tasks.filter(function(t){ return t.col === colId; });
      colTasks.forEach(function(t){ dz.appendChild(buildCard(t, board)); });
      dz.classList.toggle("empty", colTasks.length === 0);
    });

    var arbeitCount = tasks.filter(function(t){ return t.col === "arbeit"; }).length;
    var wipTag = document.getElementById("wipTag");
    wipTag.textContent = arbeitCount + "/3";
    wipTag.classList.toggle("over", arbeitCount > 3);

    var strip = document.getElementById("teamStrip");
    if (board.multiPerson){
      strip.style.display = "";
      renderTeamStrip(tasks);
    } else {
      strip.style.display = "none";
      strip.innerHTML = "";
    }
  }

  function renderTabs(){
    var wrap = document.getElementById("boardTabs");
    wrap.innerHTML = "";
    boards.forEach(function(b){
      var tab = document.createElement("button");
      tab.className = "board-tab" + (b.id === currentBoardId ? " active" : "");
      var label = document.createElement("span");
      label.textContent = b.name;
      tab.appendChild(label);
      if (b.id === currentBoardId){
        var gear = document.createElement("span");
        gear.className = "settings-icon";
        gear.textContent = "⚙";
        tab.appendChild(gear);
      }
      tab.addEventListener("click", function(){
        if (b.id === currentBoardId){
          openBoardSettingsModal(b.id);
        } else {
          currentBoardId = b.id;
          render();
        }
      });
      wrap.appendChild(tab);
    });
  }

  document.getElementById("addBoardBtn").addEventListener("click", function(){
    openTextModal({
      title:"Neues Board",
      hint:"Name für das neue Kanbanboard, z. B. ein anderes Thema oder Projekt.",
      placeholder:"z. B. Marketing-Projekte",
      confirmLabel:"Anlegen",
      onConfirm:function(v){
        var nb = makeBoard(v, [], false);
        boards.push(nb);
        currentBoardId = nb.id;
        render();
        showToast('Board "' + v + '" angelegt');
      }
    });
  });

  function renderTeamStrip(tasks){
    var names = {};
    tasks.forEach(function(t){ (t.assignees||[]).forEach(function(n){ names[n] = true; }); });
    var strip = document.getElementById("teamStrip");
    strip.innerHTML = "";
    var list = Object.keys(names);
    if (list.length === 0){
      strip.innerHTML = '<span style="font-size:11px;color:var(--muted);">noch niemand zugewiesen</span>';
      return;
    }
    list.forEach(function(n){
      var wrap = document.createElement("div");
      wrap.className = "team-avatar";
      wrap.innerHTML = '<div class="circle" style="background:'+colorFor(n)+'">'+initials(n)+'</div><span>'+escapeHtml(n)+'</span>';
      strip.appendChild(wrap);
    });
  }

  function buildCard(t, board){
    var card = document.createElement("div");
    card.className = "card col-" + t.col;
    card.dataset.id = t.id;

    var title = document.createElement("div");
    title.className = "card-title";
    title.textContent = t.text;
    card.appendChild(title);

    var chip = document.createElement("span");
    chip.className = "card-chip";
    chip.textContent = COL_LABEL[t.col];
    card.appendChild(chip);

    var metaBits = [];
    if (t.description && t.description.trim()) metaBits.push("📝 Notiz");
    if (t.startDate || t.endDate){
      metaBits.push("📅 " + (t.startDate ? fmtDate(t.startDate) : "?") + "–" + (t.endDate ? fmtDate(t.endDate) : "?"));
    }
    if (metaBits.length){
      var meta = document.createElement("div");
      meta.className = "card-meta";
      meta.textContent = metaBits.join("  ·  ");
      card.appendChild(meta);
    }

    var footer = document.createElement("div");
    footer.className = "card-footer";

    var left = document.createElement("div");
    left.className = "avatar-stack";
    if (board.multiPerson && t.assignees && t.assignees.length){
      var shown = t.assignees.slice(0,3);
      shown.forEach(function(n){
        var av = document.createElement("div");
        av.className = "av";
        av.style.background = colorFor(n);
        av.title = n;
        av.textContent = initials(n);
        left.appendChild(av);
      });
      if (t.assignees.length > 3){
        var more = document.createElement("div");
        more.className = "av more";
        more.textContent = "+" + (t.assignees.length - 3);
        left.appendChild(more);
      }
    }
    footer.appendChild(left);

    var del = document.createElement("button");
    del.className = "card-del";
    del.textContent = "×";
    del.title = "Löschen";
    del.addEventListener("pointerdown", function(e){ e.stopPropagation(); });
    del.addEventListener("click", function(){
      if (!window.confirm('Aufgabe "' + t.text + '" wirklich löschen?')) return;
      var b = getCurrentBoard();
      b.tasks = b.tasks.filter(function(x){ return x.id !== t.id; });
      render();
      showToast("Aufgabe gelöscht");
    });
    footer.appendChild(del);

    card.appendChild(footer);
    card.addEventListener("pointerdown", function(e){ startDrag(e, card, t.id); });
    return card;
  }

  var dragState = null;

  function startDrag(e, card, taskId){
    if (e.target.closest(".card-del")) return;
    if (e.button !== undefined && e.button !== 0 && e.pointerType === "mouse") return;

    var rect = card.getBoundingClientRect();
    dragState = {
      taskId: taskId, card: card,
      offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top,
      width: rect.width, startX: e.clientX, startY: e.clientY,
      moved: false, placeholder: null
    };
    document.addEventListener("pointermove", onDragMove);
    document.addEventListener("pointerup", onDragEnd);
  }

  function onDragMove(e){
    if (!dragState) return;
    var dx = Math.abs(e.clientX - dragState.startX);
    var dy = Math.abs(e.clientY - dragState.startY);

    if (!dragState.moved){
      if (dx < 6 && dy < 6) return;
      dragState.moved = true;
      var ph = document.createElement("div");
      ph.style.height = dragState.card.getBoundingClientRect().height + "px";
      ph.style.opacity = "0";
      dragState.placeholder = ph;
      dragState.card.parentNode.insertBefore(ph, dragState.card);
      dragState.card.classList.add("dragging");
      dragState.card.style.width = dragState.width + "px";
      document.body.appendChild(dragState.card);
    }

    dragState.card.style.left = (e.clientX - dragState.offsetX) + "px";
    dragState.card.style.top = (e.clientY - dragState.offsetY) + "px";

    document.querySelectorAll(".dropzone").forEach(function(z){ z.classList.remove("drag-over"); });
    var under = document.elementFromPoint(e.clientX, e.clientY);
    var zone = under && under.closest(".dropzone");
    if (zone) zone.classList.add("drag-over");
  }

  function onDragEnd(e){
    document.removeEventListener("pointermove", onDragMove);
    document.removeEventListener("pointerup", onDragEnd);
    if (!dragState) return;

    document.querySelectorAll(".dropzone").forEach(function(z){ z.classList.remove("drag-over"); });

    var taskId = dragState.taskId;

    if (!dragState.moved){
      dragState = null;
      openTaskDetailModal(taskId);
      return;
    }

    var under = document.elementFromPoint(e.clientX, e.clientY);
    var zone = under && under.closest(".dropzone");
    dragState.card.classList.remove("dragging");
    dragState.card.style.position = "";
    dragState.card.style.left = "";
    dragState.card.style.top = "";
    dragState.card.style.width = "";
    if (dragState.placeholder && dragState.placeholder.parentNode){
      dragState.placeholder.parentNode.removeChild(dragState.placeholder);
    }
    // the card was appended to document.body for the floating drag visual;
    // render() below rebuilds every dropzone from scratch, so this node
    // is never needed again and must be removed, not just unstyled.
    if (dragState.card.parentNode){
      dragState.card.parentNode.removeChild(dragState.card);
    }

    var board = getCurrentBoard();
    var task = board.tasks.find(function(t){ return t.id === taskId; });

    if (zone && task){
      var newCol = zone.dataset.col;
      task.col = newCol;
      if (newCol === "arbeit" && board.multiPerson && (!task.assignees || task.assignees.length === 0)){
        render();
        openTaskDetailModal(taskId);
        dragState = null;
        return;
      }
    }
    render();
    dragState = null;
  }

  function closeModal(){
    var ov = document.querySelector(".overlay");
    if (ov) ov.remove();
  }

  function openTextModal(opts){
    closeModal();
    var ov = document.createElement("div");
    ov.className = "overlay";
    ov.innerHTML =
      '<div class="modal">' +
        '<h3>' + escapeHtml(opts.title || "") + '</h3>' +
        (opts.hint ? '<p class="hint">' + escapeHtml(opts.hint) + '</p>' : '') +
        '<input type="text" id="modalInput" placeholder="' + escapeHtml(opts.placeholder || "") + '" value="' + escapeHtml(opts.initial || "") + '">' +
        '<div class="modal-actions">' +
          '<button class="btn btn-secondary" id="modalCancel">Abbrechen</button>' +
          '<button class="btn btn-primary" id="modalConfirm">' + escapeHtml(opts.confirmLabel || "Speichern") + '</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(ov);

    var input = document.getElementById("modalInput");
    input.focus();
    input.select();
    input.addEventListener("keydown", function(e){ if (e.key === "Enter") confirm(); });
    document.getElementById("modalCancel").addEventListener("click", closeModal);
    document.getElementById("modalConfirm").addEventListener("click", confirm);
    ov.addEventListener("click", function(e){ if (e.target === ov) closeModal(); });

    function confirm(){
      var v = input.value.trim();
      if (!v) return;
      closeModal();
      if (opts.onConfirm) opts.onConfirm(v);
    }
  }

  function openBoardSettingsModal(boardId){
    closeModal();
    var board = boards.find(function(b){ return b.id === boardId; });
    var ov = document.createElement("div");
    ov.className = "overlay";
    ov.innerHTML =
      '<div class="modal">' +
        '<h3>Grundeinstellungen</h3>' +
        '<p class="hint">Board-Name, Beteiligung und Löschen.</p>' +
        '<label>Board-Name</label>' +
        '<input type="text" id="bsName" value="' + escapeHtml(board.name) + '">' +
        '<div class="checkbox-row">' +
          '<input type="checkbox" id="bsMulti" ' + (board.multiPerson ? "checked" : "") + '>' +
          '<label for="bsMulti">Mehrere Personen an diesem Board beteiligt</label>' +
        '</div>' +
        '<div class="modal-actions-split">' +
          '<button class="btn btn-danger" id="bsDelete"' + (boards.length <= 1 ? " disabled style=\"opacity:.35;cursor:not-allowed;\"" : "") + '>Board löschen</button>' +
          '<div style="display:flex;gap:10px;">' +
            '<button class="btn btn-secondary" id="bsCancel">Abbrechen</button>' +
            '<button class="btn btn-primary" id="bsSave">Speichern</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    document.body.appendChild(ov);

    var nameInput = document.getElementById("bsName");
    nameInput.focus();
    nameInput.select();

    document.getElementById("bsCancel").addEventListener("click", closeModal);
    ov.addEventListener("click", function(e){ if (e.target === ov) closeModal(); });

    document.getElementById("bsSave").addEventListener("click", function(){
      var v = nameInput.value.trim();
      if (v) board.name = v;
      board.multiPerson = document.getElementById("bsMulti").checked;
      closeModal();
      render();
      showToast("Einstellungen gespeichert");
    });

    if (boards.length > 1){
      document.getElementById("bsDelete").addEventListener("click", function(){
        if (!window.confirm('Board "' + board.name + '" wirklich löschen? Alle Karten darin gehen unwiderruflich verloren.')) return;
        boards = boards.filter(function(x){ return x.id !== board.id; });
        if (currentBoardId === board.id) currentBoardId = boards[0].id;
        closeModal();
        render();
        showToast("Board gelöscht");
      });
    }
  }

  function openTaskDetailModal(taskId){
    closeModal();
    var board = getCurrentBoard();
    var task = board.tasks.find(function(t){ return t.id === taskId; });
    if (!task) return;

    var tempAssignees = (task.assignees || []).slice();
    var knownNames = {};
    board.tasks.forEach(function(t){ (t.assignees||[]).forEach(function(n){ knownNames[n] = true; }); });
    var quickNames = Object.keys(knownNames).filter(function(n){ return tempAssignees.indexOf(n) === -1; });

    var ov = document.createElement("div");
    ov.className = "overlay";
    ov.innerHTML =
      '<div class="modal modal-wide">' +
        '<h3>Aufgabe bearbeiten</h3>' +
        '<label>Titel</label>' +
        '<input type="text" id="dtTitle" value="' + escapeHtml(task.text) + '">' +
        '<label>Beschreibung</label>' +
        '<textarea id="dtDesc" placeholder="Details, Kontext, Hinweise …">' + escapeHtml(task.description || "") + '</textarea>' +
        '<div class="date-row">' +
          '<div><label>Start</label><input type="date" id="dtStart" value="' + (task.startDate || "") + '"></div>' +
          '<div><label>Ziel</label><input type="date" id="dtEnd" value="' + (task.endDate || "") + '"></div>' +
        '</div>' +
        (board.multiPerson ?
          '<label>Verantwortlich</label>' +
          '<div class="assignee-editor-chips" id="dtChips"></div>' +
          '<input type="text" id="dtAddPerson" placeholder="Person eingeben und Enter …">' +
          (quickNames.length ? '<div class="quick-names" id="dtQuick"></div>' : "")
          : "") +
        '<div class="modal-actions-split">' +
          '<button class="btn btn-danger" id="dtDelete">Aufgabe löschen</button>' +
          '<div style="display:flex;gap:10px;">' +
            '<button class="btn btn-secondary" id="dtCancel">Abbrechen</button>' +
            '<button class="btn btn-primary" id="dtSave">Speichern</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    document.body.appendChild(ov);

    function renderChips(){
      var wrap = document.getElementById("dtChips");
      if (!wrap) return;
      wrap.innerHTML = "";
      if (tempAssignees.length === 0){
        wrap.innerHTML = '<span style="font-size:12px;color:var(--muted);">noch niemand zugewiesen</span>';
      }
      tempAssignees.forEach(function(n){
        var chip = document.createElement("span");
        chip.className = "assignee-editor-chip";
        chip.innerHTML = escapeHtml(n) + '<button type="button">×</button>';
        chip.querySelector("button").addEventListener("click", function(){
          tempAssignees = tempAssignees.filter(function(x){ return x !== n; });
          if (quickNames.indexOf(n) === -1) quickNames.push(n);
          renderChips();
          renderQuick();
        });
        wrap.appendChild(chip);
      });
    }
    function renderQuick(){
      var q = document.getElementById("dtQuick");
      if (!q) return;
      q.innerHTML = "";
      quickNames.forEach(function(n){
        var chip = document.createElement("button");
        chip.className = "quick-chip";
        chip.type = "button";
        chip.textContent = "+ " + n;
        chip.addEventListener("click", function(){
          if (tempAssignees.indexOf(n) === -1) tempAssignees.push(n);
          quickNames = quickNames.filter(function(x){ return x !== n; });
          renderChips();
          renderQuick();
        });
        q.appendChild(chip);
      });
    }

    if (board.multiPerson){
      renderChips();
      renderQuick();
      var addInput = document.getElementById("dtAddPerson");
      addInput.addEventListener("keydown", function(e){
        if (e.key === "Enter"){
          var v = addInput.value.trim();
          if (v && tempAssignees.indexOf(v) === -1){
            tempAssignees.push(v);
            quickNames = quickNames.filter(function(x){ return x !== v; });
            renderChips();
            renderQuick();
          }
          addInput.value = "";
        }
      });
    }

    document.getElementById("dtTitle").focus();
    document.getElementById("dtCancel").addEventListener("click", closeModal);
    ov.addEventListener("click", function(e){ if (e.target === ov) closeModal(); });

    document.getElementById("dtDelete").addEventListener("click", function(){
      if (!window.confirm('Aufgabe "' + task.text + '" wirklich löschen?')) return;
      board.tasks = board.tasks.filter(function(x){ return x.id !== task.id; });
      closeModal();
      render();
      showToast("Aufgabe gelöscht");
    });

    document.getElementById("dtSave").addEventListener("click", function(){
      var title = document.getElementById("dtTitle").value.trim();
      if (title) task.text = title;
      task.description = document.getElementById("dtDesc").value.trim();
      task.startDate = document.getElementById("dtStart").value || null;
      task.endDate = document.getElementById("dtEnd").value || null;
      if (board.multiPerson) task.assignees = tempAssignees.slice();
      closeModal();
      render();
      showToast("Gespeichert");
    });
  }

  document.getElementById("addTaskBtn").addEventListener("click", addTask);
  document.getElementById("newTaskText").addEventListener("keydown", function(e){
    if (e.key === "Enter") addTask();
  });
  function addTask(){
    var input = document.getElementById("newTaskText");
    var text = input.value.trim();
    if (!text) return;
    var col = document.getElementById("newTaskCol").value;
    var board = getCurrentBoard();
    var t = {id:cid(), text:text, col:col, description:"", startDate:null, endDate:null, assignees:[]};
    board.tasks.push(t);
    input.value = "";
    render();
    showToast("Aufgabe angelegt");
    if (col === "arbeit" && board.multiPerson){
      openTaskDetailModal(t.id);
    }
  }

  function registerServiceWorker(){
    if (!("serviceWorker" in navigator)){
      return Promise.resolve();
    }
    return navigator.serviceWorker.register("./sw.js")
      .then(function(){ return navigator.serviceWorker.ready; })
      .catch(function(err){
        console.warn("Service Worker Registrierung fehlgeschlagen, Cache-Storage-Speicher nicht verfügbar:", err);
      });
  }

  registerServiceWorker().then(function(){
    return loadState();
  }).then(function(saved){
    boot(saved);
  });
})();
</script>
